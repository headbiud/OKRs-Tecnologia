<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orçamento 2026 — Tecnologia — Orçado × Realizado</title>
<style>
  :root{
    --bg:#F2F3F5; --surface:#FFFFFF; --ink:#191A1E; --muted:#646B78; --line:#E3E5E9;
    --brand:#E10A8B; --brand-ink:#9C0660;
    --con:#0E9F6E; --con-bg:#E2F5EE; --ate:#D97706; --ate-bg:#FCF1E0;
    --atr:#DC2626; --atr-bg:#FCE8E8; --and:#2563EB; --and-bg:#E7EEFD; --nao:#7C8698;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --radius:10px; --shadow:0 1px 2px rgba(20,22,28,.05),0 4px 14px rgba(20,22,28,.05);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;font-size:13px;cursor:pointer;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:7px;padding:5px 10px}
  button:hover{border-color:#C8CCD4}
  button.primary{background:var(--brand);border-color:var(--brand);color:#fff;font-weight:600}
  button.primary:hover{background:var(--brand-ink)}
  input[type=password]{font-family:inherit;font-size:13px;border:1px solid var(--line);border-radius:7px;padding:6px 8px;width:100%}
  .mono{font-family:var(--mono)}
  a{color:var(--brand-ink);text-decoration:none}

  /* Auth */
  .auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .auth-card{background:var(--surface);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);max-width:400px;width:100%;padding:26px}
  .auth-card h2{margin:6px 0 2px;font-size:18px}
  .auth-card .sub{font-size:12.5px;color:var(--muted)}
  .eyebrow{color:var(--brand);font-weight:700;font-size:11px;letter-spacing:.14em;text-transform:uppercase}
  .auth-err{margin-top:10px;font-size:12.5px;color:var(--atr);background:var(--atr-bg);border-radius:7px;padding:7px 9px}
  .auth-actions{margin-top:16px;display:flex;justify-content:flex-end;gap:8px}
  .fld{margin-top:12px}
  .fld label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:4px}

  header{background:var(--surface);border-bottom:1px solid var(--line)}
  .head-in{max-width:1060px;margin:0 auto;padding:16px 20px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;justify-content:space-between}
  h1{margin:2px 0 0;font-size:20px;letter-spacing:-.01em}
  .head-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:11px;color:var(--muted)}
  .role-pill{display:inline-flex;font-size:11px;font-weight:700;border-radius:99px;padding:3px 10px}
  .role-admin{color:var(--brand-ink);background:#FBE2F1}.role-viewer{color:var(--and);background:var(--and-bg)}

  main{max-width:1060px;margin:0 auto;padding:20px 20px 70px}
  .section{margin-top:26px}
  .label{font-size:9px;font-weight:700;letter-spacing:1.2px;color:var(--brand);text-transform:uppercase;margin-bottom:3px}
  .title{font-size:15px;font-weight:700;margin-bottom:12px}

  .cards{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  @media(max-width:820px){.cards{grid-template-columns:repeat(2,1fr)}}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 14px 12px;box-shadow:var(--shadow)}
  .card .v{font-family:var(--mono);font-size:18px;font-weight:700;line-height:1.15}
  .card .l{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-top:5px}
  .card .s{font-size:11px;color:var(--muted);margin-top:3px}

  .panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
  .p-head{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px;flex-wrap:wrap;gap:6px}
  .bar2{position:relative;background:#E9ECEF;border-radius:5px;height:12px;overflow:hidden}
  .bar2 > div{height:100%;border-radius:5px}
  .marker{position:absolute;top:-3px;width:2px;height:18px;background:#191A1E;border-radius:1px}
  .mk-label{position:absolute;top:-20px;font-size:10px;color:var(--ink);transform:translateX(-50%);white-space:nowrap}

  .proj{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:760px){.proj{grid-template-columns:1fr}}
  .proj-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
  .proj-card.rec{border-color:#BFE6D8;box-shadow:inset 0 0 0 1px #BFE6D8}
  .proj-card .tag{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
  .proj-card .tag.rec{color:var(--con)}
  .proj-card .v{font-family:var(--mono);font-size:22px;font-weight:700;margin-top:4px}
  .proj-card .d{font-size:12px;margin-top:2px}
  .proj-card .x{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.45}

  table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  th{background:#F8F9FA;font-size:9px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);padding:9px 13px;border-bottom:2px solid var(--line);text-align:left}
  td{font-size:12.5px;padding:9px 13px;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
  tr:last-child td{border-bottom:none}
  .total-row td{background:#191A1E!important;color:#fff;font-weight:700}
  .r{text-align:right}.c{text-align:center}.fw{font-weight:600}
  tr.future td{color:#9aa1ad}
  .barw{display:flex;align-items:center;gap:8px}
  .barbg{flex:1;background:#E9ECEF;border-radius:4px;height:8px;min-width:50px}
  .barfl{height:100%;border-radius:4px}

  .alert{padding:11px 15px;border-radius:7px;font-size:13px;margin-bottom:9px;line-height:1.5}
  .a-con{background:var(--con-bg);border-left:4px solid var(--con)}
  .a-ate{background:var(--ate-bg);border-left:4px solid var(--ate)}
  .a-info{background:var(--and-bg);border-left:4px solid var(--and)}
  .note{font-size:12px;color:var(--muted);line-height:1.55;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:13px 15px}
  .note b{color:var(--ink)}
  .chart-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);overflow-x:auto}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin-top:8px;padding-left:4px}
  .legend i{display:inline-block;width:14px;height:3px;border-radius:2px;margin-right:5px;vertical-align:middle}
  .footer{max-width:1060px;margin:0 auto;padding:0 20px 40px;color:var(--muted);font-size:11px;line-height:1.6}
  #app{display:none}
</style>
</head>
<body>

<div id="authRoot"></div>

<div id="app">
<header>
  <div class="head-in">
    <div>
      <div class="eyebrow">BIUD — Governança 2026</div>
      <h1>Orçamento Tecnologia · Orçado × Realizado</h1>
    </div>
    <div class="head-meta" id="headMeta"></div>
  </div>
</header>
<main id="main"></main>
<div class="footer" id="footer"></div>
</div>

<script>
"use strict";
/* ===================== DADOS =====================
   Orçamento 2026 (plano fixo) e Realizado, agregados em 4 grupos.
   Valores em R$. Ordem dos meses: Jan..Dez.
   *** ATUALIZAÇÃO MENSAL (admin) ***
   Quando um mês fechar, troque os 'null' do REALIZADO pelos valores do mês
   em cada grupo e aumente MES_FECHADO em 1. Depois suba este arquivo no GitHub.
   (Os números por pessoa NÃO entram aqui — apenas os 4 grupos.)            */

const MESES=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
let MES_FECHADO=5; // realizado disponível até Maio (5 meses)

const GRUPOS=["Pessoal","Consultoria","Ferramentas","Custos Variáveis"];

const orcamento={
 "Pessoal":         [137802.84,138352.84,128772.17,129702.17,125555.50,125555.50,125555.50,125555.50,125555.50,125555.50,125555.50,125555.50],
 "Consultoria":     [0,0,0,10000,10000,10000,10000,10000,10000,10000,10000,10000],
 "Ferramentas":     [3846.71,15366.71,15366.71,15966.71,18766.71,18766.71,18766.71,18766.71,18766.71,18766.71,18766.71,18766.71],
 "Custos Variáveis":[16276.64,18152.20,18152.20,18152.20,20952.20,20970.73,20892.72,20892.72,42833.32,70448.92,98064.52,125679.63]
};
const realizado={
 "Pessoal":         [138581.96,102911.65,114450.90,163179.47,116325.47,null,null,null,null,null,null,null],
 "Consultoria":     [0,0,0,0,0,null,null,null,null,null,null,null],
 "Ferramentas":     [3505.57,2701.70,594.95,1099.09,3181.31,null,null,null,null,null,null,null],
 "Custos Variáveis":[16023.21,16584.65,15659.76,17864.50,23351.81,null,null,null,null,null,null,null]
};

/* ===================== UTIL ===================== */
const $=(s,el=document)=>el.querySelector(s);
function brl(v,dec=0){if(v==null||isNaN(v))return"—";return"R$ "+Number(v).toLocaleString("pt-BR",{minimumFractionDigits:dec,maximumFractionDigits:dec});}
function brlk(v){if(v==null)return"—";if(Math.abs(v)>=1000)return"R$ "+(v/1000).toLocaleString("pt-BR",{minimumFractionDigits:0,maximumFractionDigits:0})+"k";return brl(v);}
function pct(v,dec=1){if(v==null||isNaN(v))return"—";return(v>=0?"+":"")+v.toLocaleString("pt-BR",{minimumFractionDigits:dec,maximumFractionDigits:dec})+"%";}
function esc(s){return String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
async function shaHex(t){const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode("biud-okr-2026::"+t));return[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,"0")).join("");}
const sum=a=>a.reduce((x,y)=>x+(y||0),0);

/* ===================== CÁLCULOS ===================== */
function calc(){
 const C=MES_FECHADO;
 const orcMonthly=MESES.map((_,i)=>sum(GRUPOS.map(g=>orcamento[g][i])));
 const realMonthly=MESES.map((_,i)=>i<C?sum(GRUPOS.map(g=>realizado[g][i])):null);
 const orcAnual=sum(orcMonthly);
 const orcYTD=sum(orcMonthly.slice(0,C));
 const realYTD=sum(realMonthly.slice(0,C));
 const desvioPeriodo=realYTD-orcYTD;
 const desvioPct=orcYTD?desvioPeriodo/orcYTD*100:0;
 const pctConsumido=orcAnual?realYTD/orcAnual*100:0;
 const pctAno=C/12*100;
 const orcFuturo=orcAnual-orcYTD;
 const forecastA=realYTD+orcFuturo;
 const runRate=C?realYTD/C:0;
 const forecastB=runRate*12;
 // acumulados
 const orcCum=[],realCum=[];let a=0,b=0;
 orcMonthly.forEach(v=>{a+=v;orcCum.push(a);});
 for(let i=0;i<C;i++){b+=realMonthly[i];realCum.push(b);}
 // projeções a partir do último ponto realizado
 const projA=[],projB=[];let pa=realYTD,pb=realYTD;
 projA[C-1]=realYTD;projB[C-1]=realYTD;
 for(let i=C;i<12;i++){pa+=orcMonthly[i];projA[i]=pa;pb+=runRate;projB[i]=pb;}
 // por grupo (período)
 const grupos=GRUPOS.map(g=>{
  const o=sum(orcamento[g].slice(0,C)),r=sum(realizado[g].slice(0,C));
  const d=r-o,p=o?d/o*100:(r>0?null:0);
  return{g,o,r,d,p};
 });
 return{C,orcMonthly,realMonthly,orcAnual,orcYTD,realYTD,desvioPeriodo,desvioPct,pctConsumido,pctAno,orcFuturo,forecastA,forecastB,runRate,orcCum,realCum,projA,projB,grupos};
}

/* cor por desvio (negativo = abaixo do orçado = bom) */
function devColor(p){if(p==null)return"var(--nao)";if(p<=0)return"var(--con)";if(p<=5)return"var(--con)";if(p<=10)return"var(--ate)";return"var(--atr)";}
function devEmoji(p){if(p==null)return"⚪";if(p<=5)return"🟢";if(p<=10)return"🟠";return"🔴";}

/* ===================== CHART (SVG acumulado) ===================== */
function chart(D){
 const W=920,H=380,L=64,R=24,T=18,B=46;
 const pw=W-L-R,ph=H-T-B;
 const yMax=2500000;
 const X=i=>L+pw/11*i;
 const Y=v=>T+ph-(v/yMax)*ph;
 const poly=(arr,from=0)=>arr.map((v,i)=>v==null?null:`${X(i)},${Y(v)}`).filter((p,i)=>p&&i>=from).join(" ");
 // grids
 let grid="",ylab="";
 for(let m=0;m<=2.5;m+=0.5){const v=m*1e6,y=Y(v);
  grid+=`<line x1="${L}" y1="${y}" x2="${W-R}" y2="${y}" stroke="#EDEFF2"/>`;
  ylab+=`<text x="${L-8}" y="${y+3}" text-anchor="end" font-size="10" fill="#868E96">${m.toLocaleString("pt-BR",{minimumFractionDigits:1})}M</text>`;}
 let xlab="";MESES.forEach((m,i)=>{xlab+=`<text x="${X(i)}" y="${H-B+18}" text-anchor="middle" font-size="10" fill="#868E96">${m}</text>`;});
 const C=D.C;
 const ptsOrc=poly(D.orcCum);
 const ptsReal=poly(D.realCum.concat(Array(12-C).fill(null)));
 const ptsA=poly(D.projA,C-1);
 const ptsB=poly(D.projB,C-1);
 // pontos-chave
 const dot=(i,v,fill)=>`<circle cx="${X(i)}" cy="${Y(v)}" r="3.5" fill="${fill}"/>`;
 const tag=(i,v,txt,fill,dy)=>`<text x="${X(i)}" y="${Y(v)+(dy||-9)}" text-anchor="${i>=10?'end':'middle'}" font-size="10.5" font-weight="700" fill="${fill}">${txt}</text>`;
 return `<div class="chart-wrap"><svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="Orçado e realizado acumulados">
   ${grid}${ylab}${xlab}
   <line x1="${X(C-1)}" y1="${T}" x2="${X(C-1)}" y2="${T+ph}" stroke="#C8CCD4" stroke-dasharray="3 3"/>
   <text x="${X(C-1)}" y="${T-4}" text-anchor="middle" font-size="9.5" fill="#868E96">fech. Mai</text>
   <polyline points="${ptsOrc}" fill="none" stroke="#7C8698" stroke-width="2.2"/>
   <polyline points="${ptsB}" fill="none" stroke="#D97706" stroke-width="2" stroke-dasharray="5 4"/>
   <polyline points="${ptsA}" fill="none" stroke="#E10A8B" stroke-width="2" stroke-dasharray="5 4"/>
   <polyline points="${ptsReal}" fill="none" stroke="#E10A8B" stroke-width="3"/>
   ${dot(C-1,D.realYTD,"#E10A8B")}
   ${dot(11,D.orcCum[11],"#7C8698")}${dot(11,D.forecastA,"#E10A8B")}${dot(11,D.forecastB,"#D97706")}
   ${tag(C-1,D.realYTD,brlk(D.realYTD),"#9C0660",-9)}
   ${tag(11,D.orcCum[11],brlk(D.orcCum[11]),"#646B78",-9)}
   ${tag(11,D.forecastA,brlk(D.forecastA),"#9C0660",14)}
   ${tag(11,D.forecastB,brlk(D.forecastB),"#B45309",-9)}
 </svg>
 <div class="legend">
   <span><i style="background:#7C8698"></i>Orçado acumulado</span>
   <span><i style="background:#E10A8B"></i>Realizado acumulado</span>
   <span><i style="background:#E10A8B;opacity:.6"></i>Projeção A (realizado + orçado futuro)</span>
   <span><i style="background:#D97706"></i>Projeção B (run-rate)</span>
 </div></div>`;
}

/* ===================== RENDER ===================== */
function render(){
 const D=calc();
 const statusEmoji=devEmoji(D.desvioPct);
 const cards=`<div class="cards">
   <div class="card"><div class="v">${brl(D.orcAnual)}</div><div class="l">Orçado 2026</div><div class="s">ano inteiro</div></div>
   <div class="card"><div class="v">${brl(D.realYTD)}</div><div class="l">Realizado</div><div class="s">jan–${MESES[D.C-1].toLowerCase()}</div></div>
   <div class="card"><div class="v" style="color:var(--brand)">${D.pctConsumido.toLocaleString("pt-BR",{minimumFractionDigits:1,maximumFractionDigits:1})}%</div><div class="l">do orçamento</div><div class="s">consumido</div></div>
   <div class="card"><div class="v" style="color:${devColor(D.desvioPct)}">${brl(D.desvioPeriodo)}</div><div class="l">Desvio do período</div><div class="s">${pct(D.desvioPct)} vs orçado</div></div>
   <div class="card"><div class="v">${statusEmoji}</div><div class="l">Status</div><div class="s">${D.desvioPct<=0?"abaixo do orçado":"acima do orçado"}</div></div>
 </div>`;

 const mkPos=Math.min(100,D.pctAno);
 const ritmo=`<div class="panel">
   <div class="p-head"><span>Consumo do orçamento anual</span><span>${D.C} de 12 meses fechados</span></div>
   <div class="bar2"><div style="width:${D.pctConsumido.toFixed(1)}%;background:var(--brand)"></div>
     <div class="marker" style="left:${mkPos}%"></div><div class="mk-label" style="left:${mkPos}%">ano: ${D.pctAno.toFixed(0)}%</div></div>
   <div class="p-head" style="margin-top:8px;margin-bottom:0"><span>${D.pctConsumido.toFixed(1)}% consumido</span>
     <span>ritmo abaixo do calendário — coerente: o orçamento concentra gastos no 2º semestre</span></div>
 </div>`;

 const dA=D.forecastA-D.orcAnual,dAp=dA/D.orcAnual*100;
 const dB=D.forecastB-D.orcAnual,dBp=dB/D.orcAnual*100;
 const proj=`<div class="proj">
   <div class="proj-card rec">
     <div class="tag rec">Projeção A · recomendada</div>
     <div class="v">${brl(D.forecastA)}</div>
     <div class="d" style="color:${devColor(dAp)}">${brl(dA)} · ${pct(dAp)} vs orçado</div>
     <div class="x">Realizado jan–${MESES[D.C-1].toLowerCase()} + orçado de ${MESES[D.C].toLowerCase()}–dez. Assume execução do plano no resto do ano — carrega adiante a economia já feita no período.</div>
   </div>
   <div class="proj-card">
     <div class="tag">Projeção B · run-rate</div>
     <div class="v">${brl(D.forecastB)}</div>
     <div class="d" style="color:${devColor(dBp)}">${brl(dB)} · ${pct(dBp)} vs orçado</div>
     <div class="x">Média mensal atual (${brl(D.runRate)}) projetada para 12 meses. <b>Subestima</b>: ignora a aceleração já orçada no 2º semestre (IUGU, ENotas, Consultoria), quando o orçado salta de ~175k para 280k/mês.</div>
   </div>
 </div>`;

 // tabela mensal
 let mrows="";
 D.orcMonthly.forEach((o,i)=>{
  const r=D.realMonthly[i];const fut=i>=D.C;
  const d=fut?null:r-o;const p=fut?null:(o?d/o*100:0);
  mrows+=`<tr class="${fut?'future':''}">
    <td>${MESES[i]}/2026${i===D.C-1?' ◀':''}</td>
    <td class="r">${brl(o)}</td>
    <td class="r fw">${fut?'<span style="color:#aab;font-style:italic">a realizar</span>':brl(r)}</td>
    <td class="r" style="color:${devColor(p)};font-weight:700">${fut?'—':brl(d)}</td>
    <td class="c">${fut?'·':devEmoji(p)+' '+pct(p)}</td></tr>`;
 });
 const mtable=`<table><thead><tr><th>Mês</th><th class="r">Orçado</th><th class="r">Realizado</th><th class="r">Desvio R$</th><th class="c">Desvio %</th></tr></thead>
   <tbody>${mrows}
   <tr class="total-row"><td>TOTAL ANO</td><td class="r">${brl(D.orcAnual)}</td><td class="r">${brl(D.realYTD)} <span style="font-weight:400;opacity:.7">(YTD)</span></td><td class="r">${brl(D.desvioPeriodo)}</td><td class="c">${pct(D.desvioPct)}</td></tr>
   </tbody></table>`;

 // tabela por grupo
 const maxAbs=Math.max(...D.grupos.map(x=>Math.abs(x.d)),1);
 let grows="";
 D.grupos.forEach(x=>{
  const w=Math.round(Math.abs(x.d)/maxAbs*100);
  grows+=`<tr>
    <td class="fw">${esc(x.g)}</td>
    <td class="r">${brl(x.o)}</td>
    <td class="r fw">${brl(x.r)}</td>
    <td class="r" style="color:${devColor(x.p)};font-weight:700">${brl(x.d)}</td>
    <td><div class="barw"><div class="barbg"><div class="barfl" style="width:${w}%;background:${devColor(x.p)}"></div></div>
      <span style="color:${devColor(x.p)};font-weight:700;min-width:64px;text-align:right">${devEmoji(x.p)} ${x.p==null?'n/d':pct(x.p)}</span></div></td></tr>`;
 });
 const gtable=`<table><thead><tr><th>Grupo</th><th class="r">Orçado (período)</th><th class="r">Realizado</th><th class="r">Desvio R$</th><th>Desvio %</th></tr></thead>
   <tbody>${grows}
   <tr class="total-row"><td>TOTAL</td><td class="r">${brl(D.orcYTD)}</td><td class="r">${brl(D.realYTD)}</td><td class="r">${brl(D.desvioPeriodo)}</td><td>${pct(D.desvioPct)}</td></tr>
   </tbody></table>`;

 const alerts=`
   <div class="alert a-con"><b>🟢 Período ${pct(D.desvioPct)} vs orçado.</b> Nos ${D.C} meses fechados, o realizado (${brl(D.realYTD)}) ficou ${brl(Math.abs(D.desvioPeriodo))} abaixo do orçado (${brl(D.orcYTD)}).</div>
   <div class="alert a-ate"><b>🟠 Ferramentas −84%.</b> O orçamento prevê DataDog, Snyk e QDrant que ainda não aparecem no realizado. Confirmar se foram contratados ou se estão lançados em "Gastos com Servidores" — isso muda a leitura do grupo.</div>

   <div class="alert a-ate"><b>⚠️ Atenção ao 2º semestre.</b> O orçamento sobe de ~R$ 175k para R$ 280k/mês até dezembro (IUGU e ENotas puxam). A economia atual não significa folga no fim do ano.</div>`;

 const nota=`<div class="note">
   <b>Como o realizado foi agrupado.</b> O realizado vem por conta contábil e foi reclassificado nos 4 grupos do orçamento:
   <b>Pessoal</b> = Salário + Ajuda de Custo + Bonificações + Plano de Saúde · <b>Custos Variáveis</b> = Gastos com Servidores + Impostos · <b>Ferramentas</b> = Software de Apoio + Desenvolvimento de Software · <b>Consultoria</b> = (sem lançamento no período).
   Os totais por grupo e por mês fecham exatamente com o relatório de origem. Por privacidade, os valores por pessoa do orçamento <b>não</b> são exibidos — apenas os grupos.
 </div>`;

 $("#main").innerHTML=`
   <div class="section"><div class="label">Painel</div><div class="title">Saúde orçamentária — ano 2026</div>${cards}</div>
   <div class="section">${ritmo}</div>

   <div class="section"><div class="label">Por categoria</div><div class="title">Desvio por grupo — período jan–${MESES[D.C-1].toLowerCase()}</div>${gtable}</div>

 $("#footer").innerHTML=`Orçamento Tecnologia — BIUD Governança 2026 · Orçado: plano anual · Realizado: jan–${MESES[D.C-1].toLowerCase()}/2026 (ContaAzul, agregado em 4 grupos). Atualização mensal pelo administrador editando o arquivo. <a href="index.html">← Voltar ao painel de OKRs</a>`;
}

/* ===================== AUTH (mesmas senhas do dados.json) ===================== */
let role=null;
function authScreen(html){$("#authRoot").innerHTML=`<div class="auth-wrap"><div class="auth-card">${html}</div></div>`;}
async function getAuth(){
 try{const r=await fetch("dados.json?ts="+Date.now(),{cache:"no-store"});if(!r.ok)return null;const d=await r.json();return d&&d.auth&&d.auth.a&&d.auth.v?d.auth:null;}
 catch(e){return null;}
}
function renderLogin(auth){
 authScreen(`
   <div class="eyebrow">BIUD — Governança 2026</div>
   <h2>Orçamento · Tecnologia</h2>
   <div class="sub">Use a mesma senha do painel de OKRs. Esta página é somente leitura.</div>
   <div class="fld"><label>Senha</label><input type="password" id="pw" autocomplete="off"></div>
   <div class="auth-err" id="authErr" style="display:none"></div>
   <div class="auth-actions"><a href="index.html"><button>OKRs</button></a><button class="primary" id="go">Entrar</button></div>`);
 const go=async()=>{const h=await shaHex($("#pw").value);
   if(h===auth.a){role="admin";enter();}
   else if(h===auth.v){role="viewer";enter();}
   else{const e=$("#authErr");e.textContent="Senha incorreta.";e.style.display="block";}};
 $("#go").addEventListener("click",go);
 $("#pw").addEventListener("keydown",e=>{if(e.key==="Enter")go();});
 $("#pw").focus();
}
function renderNoAuth(){
 authScreen(`
   <div class="eyebrow">BIUD — Governança 2026</div>
   <h2>Configuração pendente</h2>
   <div class="sub">Esta página usa as mesmas senhas do painel de OKRs, mas ainda não encontrei um <span class="mono">dados.json</span> com senhas definidas. Abra o painel de OKRs, defina as senhas e publique — depois recarregue aqui.</div>
   <div class="auth-actions"><a href="index.html"><button class="primary">Ir ao painel de OKRs</button></a></div>
   <div class="sub" style="margin-top:12px"><a href="#" id="local">Ver em modo local (teste, sem proteção)</a></div>`);
 $("#local").addEventListener("click",e=>{e.preventDefault();role="viewer";enter();});
}
function enter(){
 $("#authRoot").innerHTML="";
 $("#headMeta").innerHTML=`<span class="role-pill ${role==='admin'?'role-admin':'role-viewer'}">${role==='admin'?'ADMINISTRADOR':'VISUALIZADOR'}</span><a href="index.html"><button>← OKRs</button></a>`;
 $("#app").style.display="block";
 render();
}
(async function(){
 const auth=await getAuth();
 if(auth)renderLogin(auth);else renderNoAuth();
})();
</script>
